# Production deployment: DB + Redis + API + Web (Next.js) + Nginx.
#
# One-command startup:
#   docker compose -f docker-compose.prod.yml up -d --build
#   open http://localhost
#
# Environment is read from the auto-generated `.env.prod`. Replace with your
# own values (via `.env` or Docker secrets) before deploying for real.
# Never commit real secrets.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: contenthub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://user:pass@db:5432/contenthub
      REDIS_URL: redis://redis:6379
      # Secrets: for local one-click runs these may be empty — the entrypoint
      # (docker-entrypoint.sh) auto-generates throwaway values. For real
      # deployments, set them via `.env` or Docker secrets.
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      # Used by the entrypoint's DB liveness probe (defaults below match db:)
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: user
      DB_NAME: contenthub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NODE_ENV: production
      # Next.js standalone server.js defaults to port 3000; the nginx upstream
      # expects 3001, so we pin it here.
      PORT: "3001"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
