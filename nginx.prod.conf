events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:3000;
    }

    upstream web {
        server web:3001;
    }

    # Embedded Docker DNS resolver (127.0.0.11) — required when upstream names are
    # passed as variables (see below). `valid=` keeps entries briefly so a
    # restarting upstream is re-resolved instead of failing the proxy.
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;
        server_name _;

        # API + Swagger docs
        location /api/ {
            # Using a variable in proxy_pass forces nginx to re-resolve the name
            # via the resolver above, so a downstream restart doesn't 502 forever.
            set $api_upstream http://api;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Next.js
        location / {
            set $web_upstream http://web;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;

            # Next.js serves large precompressed .js/.css chunks. When the
            # browser fires many of them in parallel, nginx's default
            # `proxy_buffers 8 4k` overruns and silently truncates responses,
            # producing HTML5 parse errors that break hydration (the page stays
            # on its "Loading…" shell forever). DISABLING proxy_buffering makes
            # nginx stream the upstream response straight through to the client
            # without trying to buffer the whole thing — the only reliable way
            # to avoid truncation under full concurrency.
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
