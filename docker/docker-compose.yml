version: "3.9"
services:
  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/contenthub
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis

  web:
    build: ./apps/web
    environment:
      API_URL: http://api:3000

  worker:
    build: ./apps/api
    command: npm run worker
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

volumes:
  pgdata:
  redisdata:
