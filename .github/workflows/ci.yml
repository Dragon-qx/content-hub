name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-flight runs for the same branch on new commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  # Non-secret placeholders so unit/e2e tests compile without a real DB.
  DATABASE_URL: "postgresql://user:pass@localhost:5432/contenthub"
  JWT_SECRET: "ci-jwt-secret-min-32-chars-aaaaaaaaaaa"
  JWT_REFRESH_SECRET: "ci-refresh-secret-min-32-chars-bbbbbb"
  CREDENTIAL_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter=@content-hub/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter=@content-hub/api prisma:generate

      - name: Build all packages
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter=@content-hub/api prisma:generate

      - name: Run API tests
        run: pnpm --filter=@content-hub/api test

      - name: Run platform-sdk tests
        run: pnpm --filter=@content-hub/platform-sdk test

      # Jest enforces the coverage threshold declared in jest.config.js
      # (branches 60 / functions 80 / lines 80 / statements 85) and fails the
      # run if any band drops below target.
      - name: API coverage (threshold enforced)
        run: pnpm --filter=@content-hub/api test -- --coverage

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter=@content-hub/api prisma:generate

      - name: Run E2E tests
        run: pnpm --filter=@content-hub/api test:e2e

  openapi:
    name: OpenAPI spec
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI document
        run: pnpm --filter=@content-hub/api prisma:generate && pnpm --filter=@content-hub/api openapi

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: apps/api/dist/openapi.json

  # Manual / tagged deploy. Set the required repository secrets (DEPLOY_HOST,
  # DEPLOY_USER, DEPLOY_KEY, ENV_FILE) before triggering.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: [test, e2e]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -f Dockerfile.api -t content-hub-api:${{ github.sha }} .

      - name: Smoke image
        run: docker run --rm content-hub-api:${{ github.sha }} node -e "console.log('image boots')"

      - name: Summary
        run: echo "Deploy job — wire up deploy provider (e.g. ssh/docker push) as needed."
